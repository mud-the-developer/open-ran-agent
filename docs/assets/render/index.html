<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open RAN Agent Figure Preview</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --panel: rgba(255, 252, 245, 0.92);
        --ink: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
        --line: rgba(148, 163, 184, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.10), transparent 28%),
          radial-gradient(circle at top right, rgba(29, 78, 216, 0.09), transparent 22%),
          linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
        color: var(--ink);
      }

      .shell {
        width: min(1480px, calc(100vw - 48px));
        margin: 24px auto;
        padding: 20px 20px 28px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid rgba(214, 211, 209, 0.9);
        box-shadow: 0 22px 80px rgba(15, 23, 42, 0.10);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .title-block h1 {
        margin: 0;
        font-size: 24px;
      }

      .title-block p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .figure-nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .figure-nav a {
        text-decoration: none;
        color: var(--ink);
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
        font-size: 13px;
        font-weight: 700;
      }

      .figure-nav a.active {
        border-color: rgba(15, 118, 110, 0.24);
        background: rgba(209, 250, 229, 0.85);
        color: #065f46;
      }

      .viewport {
        min-height: 720px;
        padding: 18px;
        border-radius: 24px;
        border: 1px solid rgba(214, 211, 209, 0.9);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.88));
      }

      #container {
        width: 100%;
        height: 660px;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .meta code {
        font-family: "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="toolbar">
        <div class="title-block">
          <h1>AntV Infographic preview</h1>
          <p>README figures rendered from local infographic source files.</p>
        </div>
        <nav class="figure-nav" id="figure-nav"></nav>
      </div>
      <section class="viewport">
        <div id="container"></div>
      </section>
      <div class="meta">
        <div>Source: <code id="source-path"></code></div>
        <div>Status: <span id="status">loading</span></div>
      </div>
    </main>

    <script type="module" src="./preview.js"></script>
  </body>
</html>
