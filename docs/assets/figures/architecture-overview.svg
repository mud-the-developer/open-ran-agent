<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Open RAN Agent architecture overview</title>
  <desc id="desc">Operator tools flow through ranctl into BEAM apps, then through a native runtime boundary to backend runtimes with evidence and observability returned to operators.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <style>
      .ink { fill: #0f172a; }
      .muted { fill: #475569; }
      .label { font: 700 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0.08em; text-transform: uppercase; }
      .title { font: 800 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .chip { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="40" y="28" width="1200" height="704" rx="30" fill="#fffdf8" stroke="#d6d3d1"/>

  <text x="78" y="92" class="title">Open RAN Agent</text>
  <text x="78" y="124" class="subtitle">Design-first control and operations architecture for a single mutable action surface, a canonical BEAM control plane, and a native runtime boundary.</text>

  <rect x="78" y="146" width="152" height="34" rx="17" fill="#d1fae5"/>
  <text x="154" y="168" text-anchor="middle" class="chip" fill="#065f46">design first</text>
  <rect x="244" y="146" width="196" height="34" rx="17" fill="#dbeafe"/>
  <text x="342" y="168" text-anchor="middle" class="chip" fill="#1d4ed8">single mutating entrypoint</text>
  <rect x="454" y="146" width="178" height="34" rx="17" fill="#ffedd5"/>
  <text x="543" y="168" text-anchor="middle" class="chip" fill="#c2410c">inspectable evidence</text>

  <g filter="url(#shadow)">
    <rect x="72" y="208" width="178" height="392" rx="24" fill="#ecfeff" stroke="#99f6e4"/>
    <rect x="270" y="208" width="160" height="392" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
    <rect x="450" y="208" width="320" height="392" rx="24" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="790" y="208" width="190" height="392" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
    <rect x="1000" y="208" width="208" height="392" rx="24" fill="#fafaf9" stroke="#e7e5e4"/>
  </g>

  <text x="94" y="240" class="small">Operator Surface</text>
  <rect x="92" y="264" width="138" height="84" rx="18" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="110" y="292" class="label">Dashboard</text>
  <text x="110" y="314" class="body">Deploy Studio</text>
  <text x="110" y="334" class="body">Debug Desk</text>

  <rect x="92" y="366" width="138" height="84" rx="18" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="110" y="394" class="label">Skills</text>
  <text x="110" y="416" class="body">Symphony</text>
  <text x="110" y="436" class="body">Codex wrappers</text>

  <rect x="92" y="468" width="138" height="92" rx="18" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="110" y="496" class="label">Local CI</text>
  <text x="110" y="518" class="body">contract_ci</text>
  <text x="110" y="538" class="body">runtime_ci</text>

  <text x="286" y="240" class="small">Control Surface</text>
  <rect x="288" y="266" width="124" height="140" rx="20" fill="#ffffff" stroke="#93c5fd"/>
  <text x="350" y="302" text-anchor="middle" class="label">bin/ranctl</text>
  <text x="350" y="326" text-anchor="middle" class="body">precheck</text>
  <text x="350" y="346" text-anchor="middle" class="body">plan</text>
  <text x="350" y="366" text-anchor="middle" class="body">apply verify rollback</text>

  <rect x="288" y="430" width="124" height="130" rx="20" fill="#ffffff" stroke="#93c5fd"/>
  <text x="350" y="464" text-anchor="middle" class="label">Evidence</text>
  <text x="350" y="488" text-anchor="middle" class="body">plans</text>
  <text x="350" y="508" text-anchor="middle" class="body">captures</text>
  <text x="350" y="528" text-anchor="middle" class="body">remote runs</text>

  <text x="468" y="240" class="small">BEAM Umbrella</text>
  <rect x="474" y="262" width="272" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="494" y="290" class="label">ran_core / ran_config / observability</text>
  <text x="494" y="314" class="body">topology, policy, dashboard snapshot, deploy readiness</text>

  <rect x="474" y="352" width="272" height="88" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="494" y="380" class="label">ran_cu_cp / ran_cu_up / ran_du_high</text>
  <text x="494" y="404" class="body">control ownership, DU-high contract host, runtime bridges</text>

  <rect x="474" y="458" width="130" height="102" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="494" y="486" class="label">ran_scheduler_host</text>
  <text x="494" y="510" class="body">cpu scheduler</text>
  <text x="494" y="530" class="body">cuMAC adapter slot</text>

  <rect x="620" y="458" width="126" height="102" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="486" class="label">ran_fapi_core</text>
  <text x="640" y="510" class="body">canonical IR</text>
  <text x="640" y="530" class="body">capability checks</text>

  <text x="808" y="240" class="small">Native Boundary</text>
  <rect x="810" y="264" width="150" height="72" rx="18" fill="#ffffff" stroke="#fdba74"/>
  <text x="885" y="292" text-anchor="middle" class="label">fapi_rt_gateway</text>
  <text x="885" y="316" text-anchor="middle" class="body">Port framing</text>

  <rect x="810" y="356" width="150" height="92" rx="18" fill="#ffffff" stroke="#fdba74"/>
  <text x="885" y="384" text-anchor="middle" class="label">local_du_low_adapter</text>
  <text x="885" y="408" text-anchor="middle" class="body">probe</text>
  <text x="885" y="428" text-anchor="middle" class="body">session scaffold</text>

  <rect x="810" y="468" width="150" height="92" rx="18" fill="#ffffff" stroke="#fdba74"/>
  <text x="885" y="496" text-anchor="middle" class="label">aerial_adapter</text>
  <text x="885" y="520" text-anchor="middle" class="body">vendor boundary</text>
  <text x="885" y="540" text-anchor="middle" class="body">clean room contract</text>

  <text x="1018" y="240" class="small">Runtime and Ops</text>
  <rect x="1020" y="264" width="168" height="110" rx="18" fill="#ffffff" stroke="#d6d3d1"/>
  <text x="1040" y="292" class="label">Backend runtime</text>
  <text x="1040" y="316" class="body">DU low</text>
  <text x="1040" y="336" class="body">fronthaul</text>
  <text x="1040" y="356" class="body">vendor worker</text>

  <rect x="1020" y="394" width="168" height="166" rx="18" fill="#ffffff" stroke="#d6d3d1"/>
  <text x="1040" y="422" class="label">Operator outputs</text>
  <text x="1040" y="446" class="body">preview topology</text>
  <text x="1040" y="466" class="body">readiness</text>
  <text x="1040" y="486" class="body">remote handoff</text>
  <text x="1040" y="506" class="body">fetchback evidence</text>
  <text x="1040" y="526" class="body">debug summaries</text>

  <path d="M230 408 C248 408, 256 408, 270 408" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M430 336 C440 336, 444 336, 450 336" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M746 508 C764 508, 772 508, 790 508" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M980 302 C994 302, 1002 302, 1020 302" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1090 560 C1090 608, 510 608, 350 560" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="78" y="632" width="1122" height="68" rx="22" fill="#0f172a"/>
  <text x="108" y="664" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Why this shape works</text>
  <text x="108" y="688" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#cbd5e1">Operators mutate through one contract, BEAM owns supervision and policy, native workers isolate timing-sensitive paths, and every step leaves evidence behind.</text>
</svg>

