<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 680" role="img" aria-labelledby="title desc">
  <title id="title">Target host deploy and evidence loop</title>
  <desc id="desc">A packaging host prepares a bundle and safe preview, ships it to the target host for install and preflight, runs remote ranctl, and fetches evidence back into the local dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 32px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #475569; }
      .label { font: 800 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1280" height="680" fill="url(#bg)"/>
  <rect x="40" y="28" width="1200" height="624" rx="30" fill="#fffdf8" stroke="#d6d3d1"/>

  <text x="76" y="88" class="title">Target-host deploy and evidence loop</text>
  <text x="76" y="118" class="subtitle">Package locally, render safe preview files, ship to the target host, run preflight and remote actions, then fetch evidence back into the local dashboard.</text>

  <g filter="url(#shadow)">
    <rect x="76" y="168" width="264" height="368" rx="24" fill="#fff7ed" stroke="#fdba74"/>
    <rect x="368" y="168" width="236" height="368" rx="24" fill="#ecfeff" stroke="#99f6e4"/>
    <rect x="632" y="168" width="332" height="368" rx="24" fill="#eff6ff" stroke="#93c5fd"/>
    <rect x="992" y="168" width="196" height="368" rx="24" fill="#f8fafc" stroke="#cbd5e1"/>
  </g>

  <text x="94" y="202" class="small">Packaging host</text>
  <rect x="94" y="222" width="228" height="78" rx="18" fill="#ffffff" stroke="#fed7aa"/>
  <text x="114" y="250" class="label">mix ran.package_bootstrap</text>
  <text x="114" y="274" class="body">build source-first bundle</text>

  <rect x="94" y="316" width="228" height="94" rx="18" fill="#ffffff" stroke="#fed7aa"/>
  <text x="114" y="344" class="label">bin/ran-install</text>
  <text x="114" y="368" class="body">reuse bundle or package</text>
  <text x="114" y="388" class="body">compute readiness score</text>

  <rect x="94" y="426" width="228" height="92" rx="18" fill="#ffffff" stroke="#fed7aa"/>
  <text x="114" y="454" class="label">Deploy Studio</text>
  <text x="114" y="478" class="body">visual preview and handoff commands</text>
  <text x="114" y="498" class="body">latest debug incident</text>

  <text x="386" y="202" class="small">Safe preview root</text>
  <rect x="386" y="222" width="200" height="94" rx="18" fill="#ffffff" stroke="#67e8f9"/>
  <text x="406" y="250" class="label">Rendered files</text>
  <text x="406" y="274" class="body">topology</text>
  <text x="406" y="294" class="body">request env readiness</text>

  <rect x="386" y="334" width="200" height="88" rx="18" fill="#ffffff" stroke="#67e8f9"/>
  <text x="406" y="362" class="label">Handoff plan</text>
  <text x="406" y="386" class="body">scp ssh install preflight</text>

  <rect x="386" y="438" width="200" height="80" rx="18" fill="#ffffff" stroke="#67e8f9"/>
  <text x="406" y="466" class="label">Local evidence</text>
  <text x="406" y="490" class="body">quick install summaries</text>

  <text x="650" y="202" class="small">Target host</text>
  <rect x="650" y="222" width="296" height="78" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="670" y="250" class="label">install_bundle.sh</text>
  <text x="670" y="274" class="body">stage release and current symlink</text>

  <rect x="650" y="316" width="296" height="84" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="670" y="344" class="label">ran-host-preflight</text>
  <text x="670" y="368" class="body">native probe, host readiness, blockers</text>

  <rect x="650" y="416" width="296" height="102" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="670" y="444" class="label">ran-remote-ranctl</text>
  <text x="670" y="468" class="body">precheck plan apply verify rollback</text>
  <text x="670" y="488" class="body">remote evidence fetchback</text>

  <text x="1010" y="202" class="small">Fetchback and UI</text>
  <rect x="1010" y="222" width="160" height="132" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1030" y="250" class="label">artifacts/remote_runs</text>
  <text x="1030" y="274" class="body">result.jsonl</text>
  <text x="1030" y="294" class="body">fetch summary</text>
  <text x="1030" y="314" class="body">debug pack</text>

  <rect x="1010" y="372" width="160" height="146" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1030" y="400" class="label">Dashboard</text>
  <text x="1030" y="424" class="body">Deploy Studio</text>
  <text x="1030" y="444" class="body">Remote run index</text>
  <text x="1030" y="464" class="body">Debug Desk</text>
  <text x="1030" y="484" class="body">action results</text>

  <path d="M322 262 H368" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M586 272 H632" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M946 468 H992" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1090 518 C1090 576, 490 576, 208 536" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="76" y="570" width="1112" height="46" rx="20" fill="#0f172a"/>
  <text x="106" y="600" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f8fafc">Stable UX goal</text>
  <text x="248" y="600" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#cbd5e1">No hidden shell choreography: the same preview, readiness, remote execution, and debug evidence flow is visible in CLI and dashboard paths.</text>
</svg>
